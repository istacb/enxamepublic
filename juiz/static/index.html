<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENXAME - Interface de Controle</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .status-item {
            text-align: center;
            color: white;
        }
        
        .status-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .status-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: var(--dark);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .response-area {
            background: var(--light);
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .agent-card {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--success);
        }
        
        .agent-card.busy {
            border-left-color: var(--warning);
        }
        
        .agent-card.error {
            border-left-color: var(--danger);
        }
        
        .agent-name {
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        .agent-role {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .agent-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-busy {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .history-item {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .history-item:hover {
            background: #e5e7eb;
        }
        
        .history-time {
            font-size: 0.8rem;
            color: #6b7280;
        }
        
        .history-preview {
            margin-top: 5px;
            color: var(--dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐝 ENXAME - Sistema de Inteligência Coletiva</h1>
            <p>Interface de Comunicação e Controle</p>
        </header>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="status-value" id="agent-count">0</div>
                <div class="status-label">Agentes Ativos</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="tasks-count">0</div>
                <div class="status-label">Tarefas Processadas</div>
            </div>
            <div class="status-item">
                <div class="status-value" id="cluster-status">Online</div>
                <div class="status-label">Status do Cluster</div>
            </div>
        </div>
        
        <div class="card">
            <h2>📝 Nova Tarefa</h2>
            <div class="input-group">
                <textarea id="task-input" placeholder="Digite sua mensagem ou tarefa para o enxame..."></textarea>
                <button id="send-btn" onclick="sendTask()">Enviar</button>
            </div>
            <div class="response-area" id="response-area">
                Aguardando tarefa...
            </div>
        </div>
        
        <div class="card">
            <h2>🤖 Agentes Conectados</h2>
            <div class="agent-grid" id="agent-grid">
                <!-- Agentes serão carregados aqui -->
            </div>
        </div>
        
        <div class="card">
            <h2>📜 Histórico Recente</h2>
            <div id="history-list">
                <!-- Histórico será carregado aqui -->
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let tasksProcessed = 0;
        
        // Carregar dados iniciais
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadHistory();
            setInterval(loadAgents, 30000); // Atualizar agentes a cada 30s
        });
        
        async function loadAgents() {
            try {
                const response = await fetch('/api/cluster/status');
                const data = await response.json();
                
                document.getElementById('agent-count').textContent = data.agent_count || 0;
                document.getElementById('cluster-status').textContent = data.status || 'Offline';
                
                const agentGrid = document.getElementById('agent-grid');
                agentGrid.innerHTML = '';
                
                if (data.agents && data.agents.length > 0) {
                    data.agents.forEach(agent => {
                        const agentCard = document.createElement('div');
                        agentCard.className = `agent-card ${agent.status === 'busy' ? 'busy' : agent.status === 'error' ? 'error' : ''}`;
                        agentCard.innerHTML = `
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                            <span class="agent-status status-${agent.status}">${agent.status}</span>
                        `;
                        agentGrid.appendChild(agentCard);
                    });
                } else {
                    agentGrid.innerHTML = '<p>Nenhum agente conectado no momento.</p>';
                }
            } catch (error) {
                console.error('Erro ao carregar agentes:', error);
                document.getElementById('cluster-status').textContent = 'Offline';
            }
        }
        
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('enxame_history') || '[]');
            const historyList = document.getElementById('history-list');
            
            if (history.length === 0) {
                historyList.innerHTML = '<p>Nenhuma tarefa recente.</p>';
                return;
            }
            
            historyList.innerHTML = '';
            history.slice(0, 10).forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.onclick = () => showHistoryItem(item);
                historyItem.innerHTML = `
                    <div class="history-time">${new Date(item.timestamp).toLocaleString()}</div>
                    <div class="history-preview">${item.input.substring(0, 100)}${item.input.length > 100 ? '...' : ''}</div>
                `;
                historyList.appendChild(historyItem);
            });
            
            document.getElementById('tasks-count').textContent = history.length;
        }
        
        function showHistoryItem(item) {
            document.getElementById('task-input').value = item.input;
            document.getElementById('response-area').textContent = item.output;
        }
        
        async function sendTask() {
            const input = document.getElementById('task-input').value.trim();
            if (!input) {
                alert('Por favor, digite uma tarefa!');
                return;
            }
            
            const sendBtn = document.getElementById('send-btn');
            const responseArea = document.getElementById('response-area');
            
            sendBtn.disabled = true;
            responseArea.innerHTML = '<div class="loading"></div>Processando tarefa...';
            
            try {
                const response = await fetch('/api/task', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: input }),
                });
                
                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }
                
                // Usar Server-Sent Events para streaming
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    fullResponse += chunk;
                    responseArea.textContent = fullResponse;
                }
                
                // Salvar no histórico
                saveToHistory(input, fullResponse);
                tasksProcessed++;
                document.getElementById('tasks-count').textContent = tasksProcessed;
                
            } catch (error) {
                responseArea.textContent = `Erro: ${error.message}`;
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        function saveToHistory(input, output) {
            const history = JSON.parse(localStorage.getItem('enxame_history') || '[]');
            history.unshift({
                timestamp: new Date().toISOString(),
                input: input,
                output: output
            });
            
            // Manter apenas as últimas 50 tarefas
            if (history.length > 50) {
                history.splice(50);
            }
            
            localStorage.setItem('enxame_history', JSON.stringify(history));
            loadHistory();
        }
        
        // Permitir enviar com Ctrl+Enter
        document.getElementById('task-input').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendTask();
            }
        });
    </script>
</body>
</html>
