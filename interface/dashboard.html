<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enxame Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #fff; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 8px; border-left: 5px solid #007acc; }
        .card.critical { border-left-color: #ff4444; }
        .card.warning { border-left-color: #ffbb33; }
        h2 { margin-top: 0; }
        .status { font-weight: bold; }
        .ok { color: #00c851; }
        .err { color: #ff4444; }
    </style>
</head>
<body>
    <h1>🛡️ Dashboard de Saúde do Enxame</h1>
    <div id="nodes" class="grid">
        <!-- Preenchido via JS -->
    </div>
    <script>
        // Simulação de dados (conectar à API real depois)
        const nodes = [
            { id: "Juiz-01", role: "Orquestrador", status: "OK", cpu: 45, temp: 55 },
            { id: "Worker-03", role: "Jurídico", status: "OK", cpu: 80, temp: 62 },
            { id: "Guardian-01", role: "Segurança", status: "MONITORANDO", cpu: 12, temp: 40 },
            { id: "Worker-02", role: "Vendas", status: "LENTO", cpu: 98, temp: 85, alert: true }
        ];

        const container = document.getElementById('nodes');
        nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = 'card ' + (n.alert ? 'warning' : '');
            div.innerHTML = \
                <h2>\</h2>
                <p>Papel: \</p>
                <p>Status: <span class="status \">\</span></p>
                <p>CPU: \% | Temp: \°C</p>
            \;
            container.appendChild(div);
        });
    </script>
</body>
</html>
