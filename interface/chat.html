<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENXAME - Chat Descentralizado</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Status dos Nós */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .nodes-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .node-card {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--border);
            transition: all 0.3s ease;
        }

        .node-card.active {
            border-left-color: var(--success);
        }

        .node-card.inactive {
            border-left-color: var(--danger);
            opacity: 0.7;
        }

        .node-card.warning {
            border-left-color: var(--warning);
        }

        .node-card.juiz {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, rgba(59, 130, 246, 0.2) 100%);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .node-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .node-role {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .node-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-dot.offline {
            background: var(--danger);
        }

        .status-dot.degraded {
            background: var(--warning);
        }

        .node-details {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .node-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .metric {
            background: var(--bg-secondary);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .metric-label {
            color: var(--text-secondary);
            display: block;
            margin-bottom: 2px;
        }

        .metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Alertas */
        .alerts-container {
            padding: 15px;
            border-top: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: start;
            gap: 10px;
        }

        .alert-critical {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: #fca5a5;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid var(--warning);
            color: #fcd34d;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid var(--accent);
            color: #93c5fd;
        }

        .alert-icon {
            font-size: 1.2rem;
        }

        .alert-content {
            flex: 1;
        }

        .alert-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .support-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 8px;
            transition: background 0.3s;
        }

        .support-btn:hover {
            background: #dc2626;
        }

        /* Área Principal - Chat */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .juiz-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-system {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border-bottom-left-radius: 4px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .message-node-badge {
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }

        .message-content {
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 8px;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px;
            align-self: flex-start;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }

        /* Área de Input */
        .chat-input-area {
            padding: 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            max-height: 150px;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* Histórico de Chats */
        .history-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            transition: right 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .history-panel.open {
            right: 0;
        }

        .history-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .history-item:hover {
            background: var(--border);
        }

        .history-item-title {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .history-item-preview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        .close-history {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .toggle-history {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-history:hover {
            background: var(--border);
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                z-index: 100;
                height: 100vh;
            }

            .sidebar.open {
                left: 0;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar - Status dos Nós -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>🔗 Status da Rede</h2>
            <p>Monitoramento em tempo real</p>
        </div>

        <div class="nodes-list" id="nodesList">
            <!-- Nós serão inseridos via JavaScript -->
        </div>

        <div class="alerts-container" id="alertsContainer">
            <!-- Alertas serão inseridos via JavaScript -->
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="main-area">
        <header class="chat-header">
            <div class="chat-header-left">
                <button class="toggle-history" onclick="toggleHistory()">📜 Histórico</button>
                <div class="juiz-status" id="juizStatus">
                    <span class="status-dot online" id="juizDot"></span>
                    <span>Juiz Ativo: <strong id="juizName">Aguardando...</strong></span>
                </div>
            </div>
            <div>
                <button class="toggle-history" onclick="toggleSidebar()">☰ Nós</button>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages">
            <!-- Mensagens serão inseridas via JavaScript -->
        </div>

        <div class="chat-input-area">
            <div class="input-container">
                <textarea 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Digite sua mensagem..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    Enviar ➤
                </button>
            </div>
        </div>
    </main>

    <!-- Painel de Histórico -->
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3>📜 Histórico de Conversas</h3>
            <button class="close-history" onclick="toggleHistory()">×</button>
        </div>
        <div class="history-list" id="historyList">
            <!-- Histórico será inserido via JavaScript -->
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO ====================
        const API_BASE_URL = 'http://localhost:8080'; // URL da API do Enxame
        const WS_URL = 'ws://localhost:8080/ws'; // WebSocket para atualizações em tempo real

        // ==================== ESTADO DA APLICAÇÃO ====================
        let nodes = [];
        let currentJuiz = null;
        let chatHistory = [];
        let currentChat = [];
        let ws = null;

        // ==================== INICIALIZAÇÃO ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadChatHistory();
            connectWebSocket();
            fetchNodesStatus();
            setInterval(fetchNodesStatus, 5000); // Atualiza status a cada 5s
            setupInputHandler();
        });

        // ==================== WEBSOCKET ====================
        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                
                ws.onopen = () => {
                    console.log('✅ Conectado ao WebSocket');
                    addSystemMessage('Conectado à rede Enxame', 'system');
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                };

                ws.onclose = () => {
                    console.log('❌ WebSocket desconectado');
                    addSystemMessage('Conexão perdida. Reconectando...', 'system');
                    setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = (error) => {
                    console.error('Erro no WebSocket:', error);
                };
            } catch (error) {
                console.error('Falha ao conectar WebSocket:', error);
            }
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'node_status':
                    updateNodeStatus(data.node);
                    break;
                case 'node_down':
                    handleNodeDown(data.node);
                    break;
                case 'node_up':
                    handleNodeUp(data.node);
                    break;
                case 'role_change':
                    handleRoleChange(data);
                    break;
                case 'message':
                    addMessage(data.message);
                    break;
                case 'alert':
                    addAlert(data.alert);
                    break;
            }
        }

        // ==================== STATUS DOS NÓS ====================
        async function fetchNodesStatus() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/nodes`);
                if (!response.ok) throw new Error('Falha ao buscar status');
                const data = await response.json();
                nodes = data.nodes || [];
                currentJuiz = data.current_juiz || null;
                renderNodes();
                updateJuizStatus();
            } catch (error) {
                console.error('Erro ao buscar status dos nós:', error);
                // Dados mockados para demonstração
                if (nodes.length === 0) {
                    loadMockData();
                }
            }
        }

        function loadMockData() {
            // Dados de exemplo para demonstração
            nodes = [
                {
                    id: 'node-1',
                    name: 'PC-Sala-01',
                    role: 'juiz',
                    status: 'online',
                    ip: '192.168.1.100',
                    uptime: 86400,
                    cpu_usage: 45,
                    memory_usage: 62,
                    last_heartbeat: new Date().toISOString(),
                    reliability: 98
                },
                {
                    id: 'node-2',
                    name: 'PC-Quarto-02',
                    role: 'bibliotecario',
                    status: 'online',
                    ip: '192.168.1.101',
                    uptime: 72000,
                    cpu_usage: 30,
                    memory_usage: 55,
                    last_heartbeat: new Date().toISOString(),
                    reliability: 95
                },
                {
                    id: 'node-3',
                    name: 'PC-Escritorio-03',
                    role: 'worker',
                    status: 'online',
                    ip: '192.168.1.102',
                    uptime: 43200,
                    cpu_usage: 78,
                    memory_usage: 80,
                    last_heartbeat: new Date().toISOString(),
                    reliability: 92,
                    profile: 'contabil_juridico'
                },
                {
                    id: 'node-4',
                    name: 'PC-Gamer-04',
                    role: 'artista',
                    status: 'online',
                    ip: '192.168.1.103',
                    uptime: 36000,
                    cpu_usage: 25,
                    memory_usage: 40,
                    last_heartbeat: new Date().toISOString(),
                    reliability: 97,
                    gpu: 'RTX 3060'
                },
                {
                    id: 'node-5',
                    name: 'PC-Seguranca-05',
                    role: 'guardiao',
                    status: 'online',
                    ip: '192.168.1.104',
                    uptime: 86400,
                    cpu_usage: 15,
                    memory_usage: 35,
                    last_heartbeat: new Date().toISOString(),
                    reliability: 99
                },
                {
                    id: 'node-6',
                    name: 'PC-Velho-06',
                    role: 'worker',
                    status: 'offline',
                    ip: '192.168.1.105',
                    uptime: 0,
                    cpu_usage: 0,
                    memory_usage: 0,
                    last_heartbeat: new Date(Date.now() - 120000).toISOString(),
                    reliability: 85,
                    profile: 'rh_trabalhista'
                }
            ];
            currentJuiz = nodes[0];
            renderNodes();
            updateJuizStatus();
        }

        function renderNodes() {
            const container = document.getElementById('nodesList');
            container.innerHTML = '';

            nodes.forEach(node => {
                const card = createNodeCard(node);
                container.appendChild(card);
            });
        }

        function createNodeCard(node) {
            const card = document.createElement('div');
            card.className = `node-card ${node.status} ${node.role === 'juiz' ? 'juiz' : ''}`;
            card.id = `node-${node.id}`;

            const statusClass = node.status === 'online' ? 'online' : 
                               node.status === 'degraded' ? 'degraded' : 'offline';
            
            const uptimeFormatted = formatUptime(node.uptime);
            const reliabilityColor = node.reliability >= 95 ? 'var(--success)' :
                                    node.reliability >= 80 ? 'var(--warning)' : 'var(--danger)';

            card.innerHTML = `
                <div class="node-header">
                    <span class="node-name">${node.name}</span>
                    <span class="node-role">${capitalizeFirst(node.role)}</span>
                </div>
                <div class="node-status">
                    <span class="status-dot ${statusClass}"></span>
                    <span>${node.status === 'online' ? 'Online' : node.status === 'degraded' ? 'Degradado' : 'Offline'}</span>
                </div>
                <div class="node-details">
                    <div>IP: ${node.ip}</div>
                    ${node.profile ? `<div>Perfil: ${formatProfile(node.profile)}</div>` : ''}
                    ${node.gpu ? `<div>GPU: ${node.gpu}</div>` : ''}
                </div>
                <div class="node-metrics">
                    <div class="metric">
                        <span class="metric-label">Uptime</span>
                        <span class="metric-value">${uptimeFormatted}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Confiabilidade</span>
                        <span class="metric-value" style="color: ${reliabilityColor}">${node.reliability}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">CPU</span>
                        <span class="metric-value">${node.cpu_usage}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Memória</span>
                        <span class="metric-value">${node.memory_usage}%</span>
                    </div>
                </div>
            `;

            return card;
        }

        function updateNodeStatus(nodeData) {
            const index = nodes.findIndex(n => n.id === nodeData.id);
            if (index !== -1) {
                nodes[index] = { ...nodes[index], ...nodeData };
                renderNodes();
                
                if (nodeData.role === 'juiz' && nodeData.status === 'online') {
                    currentJuiz = nodes[index];
                    updateJuizStatus();
                }
            }
        }

        function updateJuizStatus() {
            const juizNameEl = document.getElementById('juizName');
            const juizDotEl = document.getElementById('juizDot');
            
            if (currentJuiz && currentJuiz.status === 'online') {
                juizNameEl.textContent = currentJuiz.name;
                juizDotEl.className = 'status-dot online';
            } else {
                juizNameEl.textContent = 'Indisponível';
                juizDotEl.className = 'status-dot offline';
                addAlert({
                    type: 'critical',
                    title: 'Juiz Indisponível',
                    message: 'Nenhum nó juiz está ativo no momento. O sistema está em processo de eleição.',
                    time: new Date().toISOString()
                });
            }
        }

        // ==================== MANIPULAÇÃO DE FALHAS ====================
        function handleNodeDown(nodeData) {
            const index = nodes.findIndex(n => n.id === nodeData.id);
            if (index !== -1) {
                nodes[index].status = 'offline';
                renderNodes();

                if (nodes[index].role === 'juiz') {
                    currentJuiz = null;
                    updateJuizStatus();
                }

                addAlert({
                    type: 'critical',
                    title: `Nó Offline: ${nodeData.name}`,
                    message: `O nó ${nodeData.name} (${nodeData.role}) caiu. Suporte técnico foi notificado automaticamente.`,
                    time: new Date().toISOString(),
                    nodeId: nodeData.id,
                    nodeName: nodeData.name,
                    nodeRole: nodeData.role
                });

                // Notificar suporte automaticamente
                notifySupport(nodeData);
            }
        }

        function handleNodeUp(nodeData) {
            const index = nodes.findIndex(n => n.id === nodeData.id);
            if (index !== -1) {
                nodes[index] = { ...nodes[index], ...nodeData, status: 'online' };
                renderNodes();

                addAlert({
                    type: 'info',
                    title: `Nó Recuperado: ${nodeData.name}`,
                    message: `O nó ${nodeData.name} está online novamente e participando do enxame.`,
                    time: new Date().toISOString()
                });
            }
        }

        function handleRoleChange(data) {
            const { nodeId, oldRole, newRole, reason } = data;
            
            addAlert({
                type: 'warning',
                title: 'Mudança de Papel',
                message: `O nó ${nodeId} mudou de ${oldRole} para ${newRole}. Motivo: ${reason}`,
                time: new Date().toISOString()
            });

            fetchNodesStatus(); // Atualiza a lista
        }

        function notifySupport(nodeData) {
            // Simulação de notificação ao suporte
            console.log('🚨 NOTIFICAÇÃO DE SUPORTE ENVIADA:');
            console.log(`Nó: ${nodeData.name} (${nodeData.id})`);
            console.log(`Papel: ${nodeData.role}`);
            console.log(`IP: ${nodeData.ip}`);
            console.log(`Último heartbeat: ${nodeData.last_heartbeat}`);
            console.log(`Ação requerida: Verificar conectividade e reiniciar serviços se necessário`);

            // Aqui você pode integrar com um sistema real de tickets
            // Ex: enviar email, criar ticket no Jira, enviar mensagem no Slack, etc.
        }

        // ==================== ALERTAS ====================
        function addAlert(alertData) {
            const container = document.getElementById('alertsContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${alertData.type}`;

            const icon = alertData.type === 'critical' ? '🚨' :
                        alertData.type === 'warning' ? '⚠️' : 'ℹ️';

            const timeFormatted = new Date(alertData.time).toLocaleTimeString('pt-BR');

            alert.innerHTML = `
                <span class="alert-icon">${icon}</span>
                <div class="alert-content">
                    <strong>${alertData.title}</strong>
                    <div>${alertData.message}</div>
                    ${alertData.nodeId ? `
                        <button class="support-btn" onclick="contactSupport('${alertData.nodeId}', '${alertData.nodeName}', '${alertData.nodeRole}')">
                            📞 Contatar Suporte
                        </button>
                    ` : ''}
                    <div class="alert-time">${timeFormatted}</div>
                </div>
            `;

            container.insertBefore(alert, container.firstChild);

            // Manter apenas os últimos 10 alertas
            while (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }

        function contactSupport(nodeId, nodeName, nodeRole) {
            const message = `Suporte Técnico - Nó ${nodeName} (${nodeRole}) está offline. ID: ${nodeId}. Favor verificar.`;
            
            // Opções de contato
            const methods = [
                'Email para equipe de TI',
                'Enviar mensagem no Slack',
                'Abrir chamado no sistema',
                'Enviar WhatsApp para responsável'
            ];

            const selectedMethod = prompt(
                `Contatar Suporte para o nó ${nodeName}\n\nEscolha o método:\n1. Email\n2. Slack\n3. Chamado\n4. WhatsApp\n\nDigite o número (1-4):`
            );

            if (selectedMethod) {
                alert(`✅ Notificação de suporte enviada!\n\nMensagem: "${message}"\n\nEquipe técnica foi acionada.`);
                console.log('Notificação de suporte:', {
                    method: methods[selectedMethod - 1],
                    nodeId,
                    nodeName,
                    nodeRole,
                    message,
                    timestamp: new Date().toISOString()
                });
            }
        }

        // ==================== CHAT ====================
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            // Adicionar mensagem do usuário
            addMessage({
                content: message,
                sender: 'user',
                timestamp: new Date().toISOString()
            });

            input.value = '';
            input.style.height = 'auto';

            // Mostrar indicador de digitação
            showTypingIndicator();

            // Enviar para a API
            sendToAPI(message);
        }

        function showTypingIndicator() {
            const container = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            container.appendChild(indicator);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendToAPI(message) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        chat_id: getCurrentChatId()
                    })
                });

                if (!response.ok) throw new Error('Falha ao enviar mensagem');

                const data = await response.json();
                hideTypingIndicator();

                // Adicionar resposta do sistema
                addMessage({
                    content: data.response,
                    sender: data.node_name || 'Sistema',
                    node_id: data.node_id,
                    node_role: data.node_role,
                    timestamp: new Date().toISOString()
                });

                // Salvar no histórico
                saveCurrentChat();

            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                hideTypingIndicator();
                
                // Resposta de fallback
                addMessage({
                    content: 'Desculpe, ocorreu um erro ao processar sua mensagem. Por favor, tente novamente.',
                    sender: 'Sistema',
                    timestamp: new Date().toISOString(),
                    error: true
                });
            }
        }

        function addMessage(msgData) {
            const container = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = `message ${msgData.sender === 'user' ? 'message-user' : 'message-system'}`;

            const timeFormatted = new Date(msgData.timestamp).toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let nodeInfo = '';
            if (msgData.node_id && msgData.node_role) {
                nodeInfo = `
                    <div class="message-header">
                        <span class="message-node-badge">
                            ${capitalizeFirst(msgData.node_role)} • ${msgData.sender}
                        </span>
                        <span>ID: ${msgData.node_id}</span>
                    </div>
                `;
            }

            message.innerHTML = `
                ${nodeInfo}
                <div class="message-content">${msgData.content}</div>
                <div class="message-time">${timeFormatted}</div>
            `;

            container.appendChild(message);
            container.scrollTop = container.scrollHeight;

            // Adicionar ao chat atual
            currentChat.push(msgData);
        }

        function addSystemMessage(content, type = 'system') {
            addMessage({
                content: content,
                sender: type,
                timestamp: new Date().toISOString()
            });
        }

        // ==================== HISTÓRICO DE CHATS ====================
        function loadChatHistory() {
            const saved = localStorage.getItem('enxame_chat_history');
            if (saved) {
                chatHistory = JSON.parse(saved);
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = '';

            if (chatHistory.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Nenhuma conversa anterior</p>';
                return;
            }

            chatHistory.slice().reverse().forEach((chat, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.onclick = () => loadChat(index);

                const firstMessage = chat.messages.find(m => m.sender === 'user');
                const preview = firstMessage ? firstMessage.content.substring(0, 50) + '...' : 'Sem mensagens';
                const timeFormatted = new Date(chat.timestamp).toLocaleString('pt-BR');

                item.innerHTML = `
                    <div class="history-item-title">Conversa ${chatHistory.length - index}</div>
                    <div class="history-item-preview">${preview}</div>
                    <div class="history-item-meta">
                        <span>${chat.messages.length} mensagens</span>
                        <span>${timeFormatted}</span>
                    </div>
                `;

                container.appendChild(item);
            });
        }

        function saveCurrentChat() {
            if (currentChat.length === 0) return;

            const existingIndex = chatHistory.findIndex(c => c.id === getCurrentChatId());
            
            if (existingIndex !== -1) {
                chatHistory[existingIndex].messages = [...currentChat];
            } else {
                chatHistory.push({
                    id: getCurrentChatId(),
                    timestamp: new Date().toISOString(),
                    messages: [...currentChat]
                });
            }

            localStorage.setItem('enxame_chat_history', JSON.stringify(chatHistory));
            renderHistory();
        }

        function loadChat(index) {
            saveCurrentChat(); // Salva chat atual antes de carregar outro
            
            const chat = chatHistory[index];
            if (!chat) return;

            currentChat = [...chat.messages];
            
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            currentChat.forEach(msg => {
                addMessage(msg);
            });

            toggleHistory(); // Fecha painel
        }

        function getCurrentChatId() {
            return 'chat_' + new Date().toISOString().split('T')[0];
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            panel.classList.toggle('open');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // ==================== UTILITÁRIOS ====================
        function formatUptime(seconds) {
            if (seconds === 0) return '0m';
            
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);

            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function formatProfile(profile) {
            return profile.split('_').map(word => capitalizeFirst(word)).join(' ');
        }

        function setupInputHandler() {
            const input = document.getElementById('chatInput');
            
            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 150) + 'px';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
    </script>
</body>
</html>
